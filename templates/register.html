<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro - Papelería LyM</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e2a38 0%, #0d6efd 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .auth-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
        }
        .auth-header {
            background-color: #f8f9fa;
            padding: 40px 30px 20px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        .auth-logo {
            width: 70px;
            height: 70px;
            background: #198754;
            border-radius: 15px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(25, 135, 84, 0.3);
        }
        .auth-body {
            padding: 30px 40px 40px;
        }
        .form-floating > .form-control:focus {
            box-shadow: none;
            border-color: #198754;
        }
        .btn-auth {
            padding: 12px;
            font-weight: 600;
            border-radius: 10px;
            margin-top: 10px;
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">
                <i class="bi bi-person-plus"></i>
            </div>
            <h4 class="fw-bold text-dark m-0">Crea tu cuenta</h4>
            <p class="text-muted small">Únete a Papelería LyM</p>
        </div>
        <div class="auth-body">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show border-0 small py-2" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="{{ url_for('registro') }}" method="POST">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" name="nombre_apellidos" id="floatingNombre" placeholder="Nombre completo" required>
                    <label for="floatingNombre">Nombre y apellidos</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" name="correo" id="floatingInput" placeholder="name@example.com" required>
                    <label for="floatingInput">Correo electrónico</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" class="form-control" name="passw" id="floatingPassword" placeholder="Contraseña" required>
                    <label for="floatingPassword">Contraseña</label>
                </div>
                
                <button class="btn btn-success w-100 btn-auth" type="submit">Registrarme</button>
                
                <div class="auth-footer">
                    ¿Ya tienes una cuenta? <a href="{{ url_for('index') }}" class="text-decoration-none fw-bold text-success">Inicia Sesión</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
