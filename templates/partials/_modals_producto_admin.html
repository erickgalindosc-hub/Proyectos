<!-- Modal Agregar Producto -->
<div class="modal fade" id="modalAgregar" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content border-0 shadow-lg">
            <form action="{{ url_for('agregar_producto') }}" method="POST" enctype="multipart/form-data">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title fw-bold">Agregar Nuevo Producto</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nombre</label>
                        <input type="text" name="nombre" class="form-control bg-light" placeholder="Ej: Cuaderno Rayado" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Descripción</label>
                        <textarea name="descripcion" class="form-control bg-light" placeholder="Detalles del producto..."></textarea>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label class="form-label fw-bold">Precio ($)</label>
                            <input type="number" step="0.01" name="precio" class="form-control bg-light" placeholder="0.00" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-bold">Stock Inicial</label>
                            <input type="number" name="stock" class="form-control bg-light" placeholder="0" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Categoría</label>
                        <select name="id_categoria" class="form-select bg-light" required>
                            <option value="">Selecciona una categoría</option>
                            {% for c in categorias %}
                                <option value="{{ c[0] }}">{{ c[1] }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Imagen</label>
                        <input type="file" name="imagen" class="form-control" accept="image/*" onchange="previewImage(event, 'previewAdd')">
                        <img id="previewAdd" src="#" alt="" class="img-fluid rounded mt-2 shadow-sm" style="display:none; max-height:120px;">
                    </div>
                </div>
                <div class="modal-footer bg-light border-0">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary fw-bold px-4">Guardar Producto</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Modal Reiniciar Tabla -->
<div class="modal fade" id="modalReiniciar" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <form action="{{ url_for('reiniciar_productos') }}" method="POST">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title fw-bold">Reiniciar Inventario</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4 text-center">
                    <i class="bi bi-exclamation-triangle-fill text-danger display-1 mb-3"></i>
                    <p class="fs-5 mb-1">¿Estás seguro de reiniciar la tabla de productos?</p>
                    <p class="text-muted small">Esta acción eliminará todos los registros y reiniciará el contador de IDs. No se puede deshacer.</p>
                </div>
                <div class="modal-footer bg-light border-0">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-danger fw-bold px-4">Confirmar Reinicio</button>
                </div>
            </form>
        </div>
    </div>
</div>
